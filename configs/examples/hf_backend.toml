[data]
input_path = "./data/raw"
file_glob = "*.txt"
encoding = "utf-8"
chunk_bytes = 4096
overlap_bytes = 256
eval_fraction = 0.1
seed = 42

[input]
preserve_document_boundaries = true
normalize_newlines = true

[output]
output_dir = "./data/processed_hf"
format = "jsonl"
compression = "zstd"

[stage_a]
enabled = true
teacher_name = "hf_causal_lm"
backend_type = "hf"
mode = "topk_logits"
top_k = 32
temperature = 1.0
model_name_or_path = "distilgpt2"
device_map = "auto"
# Optional: force last N transformer blocks to CPU when using HF backend
hf_offload_layers = 0
torch_dtype = "float16"
max_context = 2048
batch_size = 1
hf_pad_token_id = 0

[stage_b]
enabled = true
teacher_name = "hf_causal_lm"
backend_type = "hf"
mode = "long_context"
top_k = 32
temperature = 1.0
context_window = 8192
stride = 2048
max_teacher_context = 4096

[stage_c]
enabled = true
teacher_name = "hf_causal_lm"
backend_type = "hf"
mode = "structured_outputs"
top_k = 16
temperature = 0.7
template_name = "summarize_chunk"
deterministic = true
