[data]
input_path = "./data/raw"
file_glob = "*.txt"
encoding = "utf-8"
chunk_bytes = 4096
overlap_bytes = 256
eval_fraction = 0.1
seed = 42

[input]
preserve_document_boundaries = true
normalize_newlines = true

[output]
output_dir = "./data/processed_llamacpp"
format = "jsonl"
compression = "zstd"

[stage_a]
enabled = true
teacher_name = "llamacpp_server"
backend_type = "llamacpp_server"
mode = "topk_logits"
top_k = 32
temperature = 1.0
max_context = 2048
llama_base_url = "http://127.0.0.1:8080"
llama_model_hint = ""
llama_request_timeout = 30.0

[stage_b]
enabled = true
teacher_name = "llamacpp_server"
backend_type = "llamacpp_server"
mode = "long_context"
top_k = 32
temperature = 1.0
context_window = 8192
stride = 2048
max_teacher_context = 4096
llama_base_url = "http://127.0.0.1:8080"
llama_model_hint = ""
llama_request_timeout = 30.0

[stage_c]
enabled = true
teacher_name = "llamacpp_server"
backend_type = "llamacpp_server"
mode = "topk_logits"
top_k = 16
temperature = 0.7
llama_base_url = "http://127.0.0.1:8080"
llama_model_hint = ""
llama_request_timeout = 30.0
