[data]
# To run distillation over a built corpus mixture, point to a split folder, for example:
# input_path = "data/corpora/base_mix_v1/train"
# file_glob = "*.txt"
input_path = "./data/raw"
file_glob = "*.txt"
encoding = "utf-8"
chunk_bytes = 4096
overlap_bytes = 256
eval_fraction = 0.1
seed = 42

[input]
preserve_document_boundaries = true
normalize_newlines = true

[output]
output_dir = "./data/processed"
format = "jsonl"
compression = "zstd"

# Default example now uses explicit runtime backend selection.
# Switch to the dedicated backend examples for ready-to-run variants:
# - configs/examples/hf_backend.toml
# - configs/examples/vllm_backend.toml
# - configs/examples/llamacpp_server_backend.toml

[stage_a]
enabled = true
teacher_name = "hf_causal_lm"
backend_type = "hf"
mode = "topk_logits"
top_k = 32
temperature = 1.0
model_name_or_path = "distilgpt2"
device_map = "auto"
torch_dtype = "float16"
max_context = 2048
batch_size = 1

# Position-aware export filtering policy (schema-only for now; filtering implementation lands later).
enable_position_filtering = false
entropy_threshold = 1.5
top1_gap_threshold = 0.2
selection_window_radius = 0
selection_mode = "none"
minimum_selected_positions_per_record = 1

[stage_b]
enabled = true
teacher_name = "hf_causal_lm"
backend_type = "hf"
mode = "long_context"
top_k = 32
temperature = 1.0
context_window = 8192
stride = 2048
max_teacher_context = 4096

# Position-aware export filtering policy (schema-only for now; filtering implementation lands later).
enable_position_filtering = false
entropy_threshold = 1.5
top1_gap_threshold = 0.2
selection_window_radius = 2
selection_mode = "none"
minimum_selected_positions_per_record = 1

[stage_c]
enabled = true
teacher_name = "hf_causal_lm"
backend_type = "hf"
mode = "structured_outputs"
top_k = 16
temperature = 0.7
template_name = "summarize_chunk"
deterministic = true
